name: 🚀 Production Deployment Pipeline

on:
  workflow_run:
    workflows: ["⛑️ Pre-Deployment Security Gates"]
    types:
      - completed


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Condition: 
    # 1. The pre-deploy workflow must have succeeded
    # 2. The event that kicked off the pre-deploy must be a 'push' (not a pull_request)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.triggering_actor != 'dependabot[bot]' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          